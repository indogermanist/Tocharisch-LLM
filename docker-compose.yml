services:
  neo4j:
    image: neo4j:latest
    environment:
      NEO4J_AUTH: ${NEO_4J_USER:-neo4j}/${NEO_4J_PASSWORD:-your_password}
      NEO4J_server_http_listen__address: :8474
      NEO4J_server_bolt_listen__address: :8687
    ports:
      - "8474:8474"
      - "8687:8687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEO_4J_HOST: neo4j
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - neo4j
      - qdrant
    ports:
      - "8501:8501"
    command:
      - poetry
      - run
      - streamlit
      - run
      - src/streamlit/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    env_file:
      - .env
    environment:
      NEO_4J_HOST: neo4j
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - neo4j
      - qdrant
    entrypoint:
      - poetry
      - run
      - python
      - -m
      - src.services.run_ingestion

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  qdrant_data:
